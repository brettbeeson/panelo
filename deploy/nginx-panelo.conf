# Ensure this map exists at http{} scope (usually in nginx.conf), not in server{}:
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }

# Include this INSITE your server block
# this uses a subsite path (not subdomain).
    location = /panelo {
        return 301 /panelo/;
    }

    # ^~ means "if the request starts with this string, use this block and don't check other regex locations"
    location ^~ /panelo/ {
        proxy_pass http://127.0.0.1:7070/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Prefix /panelo;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300;
        proxy_send_timeout 300;
}